# .terrateam/config.yml
# Combined infrastructure + monitoring Terrateam configuration.
# ── Infrastructure section is managed dynamically by DeployFlow at deploy time.
# ── Monitoring section is written once at bootstrap and not regenerated per deploy.

dirs:
  "terraform":
    tags: ["deployflow"]
  "monitoring":
    tags: ["monitoring"]

destination_branches:
  # Infrastructure (managed by DeployFlow deploy)
  - "main"
  - "poc"
  - "dev"
  # Monitoring (added by bootstrap)
  - "monitor-dev"
  - "monitor-prod"
  - "monitor-poc"

engine:
  name: "terraform"
  version: "1.14.5"

# ── Infrastructure workflows are injected dynamically by GenerateTerrateamConfigContent() ──
# ── The app appends per-env workflow blocks with tag_query "deployflow and dest_branch:{env}" ──
workflows:
  - tag_query: "monitoring and dest_branch:monitor-poc"
    plan:
      - type: env
        name: ARM_TENANT_ID
        cmd: ['echo', '${POC_ARM_TENANT_ID}']
      - type: env
        name: ARM_SUBSCRIPTION_ID
        cmd: ['echo', '${POC_ARM_SUBSCRIPTION_ID}']
      - type: env
        name: ARM_CLIENT_ID
        cmd: ['echo', '${POC_ARM_CLIENT_ID}']
      - type: env
        name: ARM_CLIENT_SECRET
        cmd: ['echo', '${POC_ARM_CLIENT_SECRET}']
        sensitive: true
      - type: init
        extra_args:
          - "-input=false"
          - "-reconfigure"
          - "-backend-config=tenant_id=${POC_TFSTATE_TENANT_ID}"
          - "-backend-config=client_id=${POC_TFSTATE_CLIENT_ID}"
          - "-backend-config=client_secret=${POC_TFSTATE_CLIENT_SECRET}"
          - "-backend-config=subscription_id=${POC_TFSTATE_SUB}"
          - "-backend-config=resource_group_name=${POC_TFSTATE_RG}"
          - "-backend-config=storage_account_name=${POC_STORAGE}"
          - "-backend-config=container_name=tfstate"
          - "-backend-config=key=monitoring.poc.terraform.tfstate"
      - type: plan
        extra_args: ["-var-file=poc.tfvars"]

    apply:
      - type: env
        name: ARM_TENANT_ID
        cmd: ['echo', '${POC_ARM_TENANT_ID}']
      - type: env
        name: ARM_SUBSCRIPTION_ID
        cmd: ['echo', '${POC_ARM_SUBSCRIPTION_ID}']
      - type: env
        name: ARM_CLIENT_ID
        cmd: ['echo', '${POC_ARM_CLIENT_ID}']
      - type: env
        name: ARM_CLIENT_SECRET
        cmd: ['echo', '${POC_ARM_CLIENT_SECRET}']
        sensitive: true
      - type: init
        extra_args:
          - "-input=false"
          - "-reconfigure"
          - "-backend-config=tenant_id=${POC_TFSTATE_TENANT_ID}"
          - "-backend-config=client_id=${POC_TFSTATE_CLIENT_ID}"
          - "-backend-config=client_secret=${POC_TFSTATE_CLIENT_SECRET}"
          - "-backend-config=subscription_id=${POC_TFSTATE_SUB}"
          - "-backend-config=resource_group_name=${POC_TFSTATE_RG}"
          - "-backend-config=storage_account_name=${POC_STORAGE}"
          - "-backend-config=container_name=tfstate"
          - "-backend-config=key=monitoring.poc.terraform.tfstate"
      - type: apply
        extra_args: ["-var-file=poc.tfvars"]

